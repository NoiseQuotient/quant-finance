<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantFrontier — Financial Intelligence Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.04);
      --primary: #3b82f6;
      --primary-light: #60a5fa;
      --secondary: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #475569;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 0.9rem;
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .logo-sub {
      font-size: 0.75rem;
      color: var(--text2);
      font-family: var(--mono);
      margin-top: 0.1rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 0.9rem;
    }
    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem 0.6rem 2.5rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: var(--primary);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text2);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── MAIN CONTENT ───────────────────────── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── CATEGORY NAVIGATION ───────────────── */
    .category-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    
    .category-filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    
    .category-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .category-btn:hover {
      border-color: var(--primary);
      color: var(--text);
      transform: translateY(-1px);
    }
    
    .category-btn.active {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.2);
    }
    
    .category-icon {
      font-size: 1.1rem;
    }
    
    .category-text {
      white-space: nowrap;
    }
    
    .search-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    
    .search-box {
      position: relative;
      width: 300px;
    }
    
    @media (max-width: 768px) {
      .category-nav {
        flex-direction: column;
        align-items: stretch;
      }
      
      .category-filters {
        justify-content: center;
      }
      
      .search-container {
        width: 100%;
        justify-content: center;
      }
      
      .search-box {
        width: 100%;
      }
    }

    /* ── ARTICLES GRID ──────────────────────── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 1.25rem;
      margin-bottom: 3rem;
    }

    .article-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .article-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .article-header {
      padding: 1.25rem 1.25rem 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .article-source {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .source-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-family: var(--mono);
    }
    .badge-research {
      background: rgba(139, 92, 246, 0.1);
      color: var(--secondary);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }
    .badge-news {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    .badge-analysis {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .badge-premium {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .article-time {
      font-size: 0.75rem;
      color: var(--text3);
      font-family: var(--mono);
    }

    .article-content {
      padding: 0 1.25rem 1rem;
    }
    .article-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-desc {
      font-size: 0.875rem;
      color: var(--text2);
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-footer {
      padding: 0.75rem 1.25rem;
      background: var(--bg3);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .article-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text2);
      font-family: var(--mono);
    }
    .article-actions {
      display: flex;
      gap: 0.5rem;
    }
    .action-btn {
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 4px;
      text-decoration: none;
      font-family: var(--mono);
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .btn-primary:hover {
      background: var(--primary-light);
    }
    .btn-archive {
      background: rgba(139, 92, 246, 0.1);
      color: var(--secondary);
      border-color: rgba(139, 92, 246, 0.2);
    }
    .btn-archive:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
    }
    .btn-archive.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-summary {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      border-color: rgba(245, 158, 11, 0.2);
    }
    .btn-summary:hover {
      background: rgba(245, 158, 11, 0.2);
      border-color: rgba(245, 158, 11, 0.4);
    }
    .summary-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .summary-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .summary-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .summary-text {
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .summary-close {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--sans);
    }

    /* ── LOADING & EMPTY STATES ────────────── */
    .loading {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text2);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text2);
    }

    /* ── FOOTER ────────────────────────────── */
    .footer {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 2rem;
      margin-top: 3rem;
      text-align: center;
      color: var(--text2);
      font-size: 0.875rem;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }
    .footer-link {
      color: var(--text2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-link:hover {
      color: var(--text);
    }

    /* ── RESPONSIVE ────────────────────────── */
    @media (max-width: 1024px) {
      .articles-grid {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      }
    }
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }
      .nav {
        gap: 1rem;
      }
      .search-box {
        width: 100%;
      }
      .container {
        padding: 1rem;
      }
      .articles-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <a href="#" class="logo">
      <div class="logo-icon">QF</div>
      <div>
        <div class="logo-text">QuantFrontier</div>
        <div class="logo-sub">FINANCIAL INTELLIGENCE TERMINAL</div>
      </div>
    </a>
    
    <div class="header-actions">
      <div class="status">
        <span class="status-dot"></span>
        <span>Quant Finance Terminal</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    <!-- CATEGORY NAVIGATION -->
    <div class="category-nav">
      <div class="category-filters">
        <button class="category-btn active" data-category="all">
          <span class="category-icon">📊</span>
          <span class="category-text">All Articles</span>
        </button>
        <button class="category-btn" data-category="research">
          <span class="category-icon">📚</span>
          <span class="category-text">Research Papers</span>
        </button>
        <button class="category-btn" data-category="news">
          <span class="category-icon">📰</span>
          <span class="category-text">Financial News</span>
        </button>
        <button class="category-btn" data-category="analysis">
          <span class="category-icon">📈</span>
          <span class="category-text">Market Analysis</span>
        </button>
      </div>
      
      <div class="search-container">
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input type="text" class="search-input" placeholder="Search quant finance articles..." id="searchInput">
        </div>
        <div class="status">
          <span class="status-dot"></span>
          <span id="lastUpdate">Just now</span>
        </div>
      </div>
    </div>

    <!-- ARTICLES -->
    <div id="articles-container">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading quant finance intelligence...</div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/NoiseQuotient/quant-finance" class="footer-link">GitHub</a>
      <a href="https://arxiv.org" class="footer-link">arXiv</a>
      <a href="https://archive.today" class="footer-link">Archive</a>
      <a href="https://docs.openclaw.ai" class="footer-link">OpenClaw</a>
    </div>
    <div>QuantFrontier — Financial Intelligence Terminal</div>
    <div style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text3);">
      Auto-updated every 30 minutes • Archive links for paywalled content
    </div>
  </footer>

  <script>
    // State
    let allItems = [];
    let activeCategory = 'all';
    let searchQuery = '';

    // DOM Elements
    const articlesContainer = document.getElementById('articles-container');
    const searchInput = document.getElementById('searchInput');
    const lastUpdateEl = document.getElementById('lastUpdate');

    // Load data
    async function loadData() {
      try {
        const response = await fetch('./data.json?t=' + Date.now());
        if (!response.ok) throw new Error('Failed to load data');
        const data = await response.json();
        
        allItems = data.items || [];
        
        // Update timestamp
        const updated = data.updated ? new Date(data.updated) : new Date();
        lastUpdateEl.textContent = `Updated ${formatRelativeTime(updated)}`;
        
        renderArticles();
      } catch (error) {
        articlesContainer.innerHTML = `
          <div class="empty-state">
            <div style="font-size: 2rem; margin-bottom: 1rem;">⚠️</div>
            <div>Failed to load data</div>
            <div style="margin-top: 0.5rem; font-size: 0.875rem;">${error.message}</div>
          </div>
        `;
        console.error('Error loading data:', error);
      }
    }

    // Format time
    function formatTime(date) {
      return date.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: false 
      });
    }

    // Format relative time
    function formatRelativeTime(date) {
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / (1000 * 60));
      const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Render articles
    function renderArticles() {
      let filteredItems = [...allItems];
      
      // Apply category filter
      if (activeCategory !== 'all') {
        filteredItems = filteredItems.filter(item => item.type === activeCategory);
      }
      
      // Apply search
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filteredItems = filteredItems.filter(item => 
          item.title.toLowerCase().includes(query) || 
          item.desc.toLowerCase().includes(query) ||
          item.label.toLowerCase().includes(query) ||
          item.tags?.some(tag => tag.toLowerCase().includes(query))
        );
      }
      
      // Sort by date (newest first)
      filteredItems.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      if (filteredItems.length === 0) {
        articlesContainer.innerHTML = `
          <div class="empty-state">
            <div style="font-size: 2rem; margin-bottom: 1rem;">📄</div>
            <div>No articles found</div>
            <div style="margin-top: 0.5rem; font-size: 0.875rem;">Try changing category or search terms</div>
          </div>
        `;
        return;
      }
      
      // Show all articles in one grid (no section headers)
      let html = '<div class="articles-grid">';
      filteredItems.forEach(item => html += renderArticle(item));
      html += '</div>';
      
      articlesContainer.innerHTML = html;
    }

    // Render single article
    function renderArticle(item) {
      const date = new Date(item.date);
      const isPaywalled = item.isPaywalled || item.tags?.includes('premium');
      const hasArchive = item.archiveLink;
      
      // Use archive link for paywalled sites if available
      const primaryLink = (isPaywalled && hasArchive) ? item.archiveLink : item.link;
      const showArchiveBtn = (isPaywalled && hasArchive && primaryLink !== item.archiveLink);
      
      let badgeClass = 'badge-news';
      if (item.type === 'research') badgeClass = 'badge-research';
      if (item.type === 'analysis') badgeClass = 'badge-analysis';
      
      const tagsHtml = item.tags?.map(tag => 
        `<span class="tag">${escapeHtml(tag)}</span>`
      ).join('') || '';
      
      let archiveBtn = '';
      if (showArchiveBtn) {
        archiveBtn = `<a href="${escapeHtml(item.archiveLink)}" class="action-btn btn-archive" target="_blank" rel="noopener" title="View archived version">Archive</a>`;
      } else if (isPaywalled && !hasArchive) {
        archiveBtn = `<span class="action-btn btn-archive disabled" title="Archive being generated">Archive</span>`;
      }
      
      // Button text based on link type
      const primaryBtnText = (isPaywalled && hasArchive) ? 'Read (Archived)' : 'Read';
      const primaryBtnClass = (isPaywalled && hasArchive) ? 'btn-archive' : 'btn-primary';
      
      // Summary button (will trigger AI summary)
      const summaryBtn = `<button class="action-btn btn-summary" data-id="${item.link}" onclick="showSummary('${escapeHtml(item.link)}', '${escapeHtml(item.title)}', '${escapeHtml(item.desc || '')}')">Summary</button>`;
      
      return `
        <div class="article-card" data-id="${item.link}">
          <div class="article-header">
            <div class="article-source">
              <span class="source-badge ${badgeClass}">${escapeHtml(item.label)}</span>
              ${isPaywalled ? '<span class="source-badge badge-premium" style="background:rgba(245,158,11,0.1);color:#f59e0b;border-color:rgba(245,158,11,0.2);font-size:0.7em;padding:0.15rem 0.5rem;">Premium</span>' : ''}
            </div>
            <div class="article-time">${formatRelativeTime(date)}</div>
          </div>
          <div class="article-content">
            <div class="article-title">${escapeHtml(item.title)}</div>
            ${item.desc ? `<div class="article-desc">${escapeHtml(item.desc)}</div>` : ''}
          </div>
          <div class="article-footer">
            <div class="article-tags">${tagsHtml}</div>
            <div class="article-actions">
              ${summaryBtn}
              ${archiveBtn}
              <a href="${escapeHtml(primaryLink)}" class="action-btn ${primaryBtnClass}" target="_blank" rel="noopener" title="${isPaywalled && hasArchive ? 'Read archived version (no paywall)' : 'Read original article'}">
                ${primaryBtnText}
              </a>
            </div>
          </div>
        </div>
      `;
    }

    // Show summary modal
    function showSummary(link, title, description) {
      // For now, use description as summary
      // In production, this would call an AI API
      const summary = description || 'No summary available. Click "Read" to view full article.';
      
      const modal = document.createElement('div');
      modal.className = 'summary-modal';
      modal.innerHTML = `
        <div class="summary-content">
          <div class="summary-title">${escapeHtml(title)}</div>
          <div class="summary-text">${escapeHtml(summary)}</div>
          <div style="text-align: center;">
            <button class="summary-close" onclick="this.closest('.summary-modal').remove()">Close</button>
          </div>
        </div>
      `;
      
      document.body.appendChild(modal);
      
      // Close on background click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.remove();
        }
      });
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    function setupEventListeners() {
      // Category buttons
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeCategory = btn.dataset.category;
          renderArticles();
        });
      });
      
      // Search
      searchInput.addEventListener('input', () => {
        searchQuery = searchInput.value.trim();
        renderArticles();
      });
      
      // Auto-refresh every 10 minutes
      setInterval(loadData, 10 * 60 * 1000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      loadData();
    });
  </script>
</body>
</html>
