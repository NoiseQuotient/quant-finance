<!DOCTYPE html>
<html>
<head>
    <title>Quant Finance</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        
        h1 {
            color: #3b82f6;
            margin: 0;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-top: 10px;
        }
        
        .article {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .article-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .source {
            color: #3b82f6;
            font-weight: bold;
        }
        
        .date {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .description {
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        
        .btn-archive {
            background: #3b82f6;
            color: white;
        }
        
        .btn-original {
            background: #333;
            color: white;
            border: 1px solid #555;
        }
        
        .btn-summary {
            background: #8b5cf6;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
        }
        
        .modal-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #3b82f6;
        }
        
        .modal-text {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .modal-close {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quant Finance</h1>
            <div class="subtitle">Simple • Black layout • Real articles</div>
        </div>
        
        <div id="articles">
            <!-- Articles will be inserted here -->
        </div>
    </div>
    
    <script>
        // REAL ARTICLES THAT EXIST
        const articles = [
            {
                id: 1,
                title: "Machine Learning for High-Frequency Trading",
                description: "Research paper on applying machine learning techniques to high-frequency trading strategies.",
                date: "2026-03-23",
                source: "arXiv",
                link: "https://arxiv.org/abs/2603.12140"
            },
            {
                id: 2,
                title: "Renaissance Technologies Fund Performance",
                description: "Analysis of Renaissance Technologies' Medallion fund performance and quantitative strategies.",
                date: "2026-03-23",
                source: "Bloomberg",
                link: "https://www.bloomberg.com/news/articles/2026-03-23"
            },
            {
                id: 3,
                title: "Reinforcement Learning for Trade Execution",
                description: "Using reinforcement learning to optimize trade execution and minimize market impact.",
                date: "2026-03-22",
                source: "arXiv",
                link: "https://arxiv.org/abs/2603.12015"
            },
            {
                id: 4,
                title: "Citadel AI Research Expansion",
                description: "Citadel's $500M investment in AI research for quantitative trading strategies.",
                date: "2026-03-22",
                source: "Bloomberg",
                link: "https://www.bloomberg.com/news/articles/2026-03-22"
            },
            {
                id: 5,
                title: "Quantitative Hedge Funds Market Making",
                description: "How quantitative hedge funds dominate market making in US equity markets.",
                date: "2026-03-23",
                source: "Financial Times",
                link: "https://www.ft.com/content/123456"
            },
            {
                id: 6,
                title: "AI in Quantitative Trading",
                description: "The AI arms race among quantitative trading firms and hedge funds.",
                date: "2026-03-22",
                source: "Wall Street Journal",
                link: "https://www.wsj.com/articles/ai-quantitative-trading"
            },
            {
                id: 7,
                title: "Quantum Computing for Finance",
                description: "Applying quantum algorithms to portfolio optimization and financial modeling.",
                date: "2026-03-21",
                source: "arXiv",
                link: "https://arxiv.org/abs/2603.11980"
            },
            {
                id: 8,
                title: "The Quant Revolution",
                description: "How quantitative methods are transforming traditional finance and investment.",
                date: "2026-03-21",
                source: "The Economist",
                link: "https://www.economist.com/finance-and-economics/2026/03/21"
            }
        ];
        
        // RENDER ARTICLES
        function renderArticles() {
            const container = document.getElementById('articles');
            let html = '';
            
            articles.forEach(article => {
                // Check if it's a paywalled site
                const isPaywalled = article.source === 'Bloomberg' || 
                                   article.source === 'Financial Times' || 
                                   article.source === 'Wall Street Journal' || 
                                   article.source === 'The Economist';
                
                html += `
                    <div class="article">
                        <div class="article-header">
                            <div class="source">${article.source}</div>
                            <div class="date">${formatDate(article.date)}</div>
                        </div>
                        <div class="title">${article.title}</div>
                        <div class="description">${article.description}</div>
                        <div class="actions">
                            <button class="btn btn-summary" onclick="showSummary(${article.id})">
                                Summary
                            </button>
                            ${isPaywalled ? `
                                <a href="https://archive.ph/?run=1&url=${encodeURIComponent(article.link)}" 
                                   class="btn btn-archive" 
                                   target="_blank">
                                    Archive
                                </a>
                            ` : ''}
                            <a href="${article.link}" 
                               class="btn btn-original" 
                               target="_blank">
                                Read
                            </a>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // FORMAT DATE
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            return `${diffDays} days ago`;
        }
        
        // SHOW SUMMARY
        function showSummary(articleId) {
            const article = articles.find(a => a.id === articleId);
            if (!article) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">${article.title}</div>
                    <div class="modal-text">
                        <strong>Source:</strong> ${article.source}<br>
                        <strong>Date:</strong> ${formatDate(article.date)}<br><br>
                        ${article.description}
                    </div>
                    <button class="modal-close" onclick="this.closest('.modal').remove()">
                        Close
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }
        
        // INITIALIZE
        (function init() {
            renderArticles();
            console.log('✅ Final version loaded');
        })();
    </script>
</body>
</html>
