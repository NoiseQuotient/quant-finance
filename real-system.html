        body { background: #0a0a0f; color: #e2e8f0; font-family: sans-serif; padding: 20px; }

        h1 { color: #3b82f6; margin-bottom: 10px; }
        .subtitle { color: #94a3b8; margin-bottom: 20px; }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: #151520;
            border-radius: 8px;
            min-width: 120px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #3b82f6;
        }
        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
        }
        
        /* Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 20px; background: #1e1e2e; border: 1px solid #2d3748; color: #94a3b8; border-radius: 6px; cursor: pointer; }
        button.active { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #3b82f6; }
        input { padding: 10px; background: #1e1e2e; border: 1px solid #2d3748; color: white; border-radius: 6px; width: 300px; max-width: 100%; }
        
        /* Articles */
        .articles { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .article { background: #151520; border: 1px solid #2d3748; border-radius: 8px; padding: 20px; }
        .article-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .source { 
            background: rgba(59, 130, 246, 0.1); 
            color: #3b82f6; 
            padding: 5px 10px; 
            border-radius: 4px; 
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .source.premium::before { content: "🔒 "; }
        .source.free::before { content: "📄 "; }
        .time { color: #64748b; font-size: 12px; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .desc { color: #94a3b8; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .tags { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tag { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 14px; display: inline-block; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-archive { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; border: 1px solid rgba(139, 92, 246, 0.2); }
        .btn-original { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-summary { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); cursor: pointer; }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3748;
            border-top-color: #3b82f6;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #151520; padding: 30px; border-radius: 8px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 18px; margin-bottom: 15px; }
        .modal-text { color: #94a3b8; margin-bottom: 20px; line-height: 1.6; }
        .modal-close { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>

        // ========== APPLICATION CODE ==========
        let currentFilter = 'all';
        let currentSearch = '';
        
        function init() {
            updateStats();
            renderArticles();
            console.log('Real system loaded with', realArticles.length, 'articles');
        }
        
        function updateStats() {
            const total = realArticles.length;
            const research = realArticles.filter(a => a.type === 'research').length;
            const news = realArticles.filter(a => a.type === 'news').length;
            const premium = realArticles.filter(a => a.premium).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('researchCount').textContent = research;
            document.getElementById('newsCount').textContent = news;
            document.getElementById('premiumCount').textContent = premium;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return diffDays + ' days ago';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function renderArticles() {
            let filtered = realArticles;
            
            // Apply filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(a => a.type === currentFilter);
            }
            
            // Apply search
            if (currentSearch) {
                const query = currentSearch.toLowerCase();
                filtered = filtered.filter(a => 
                    a.title.toLowerCase().includes(query) || 
                    a.desc.toLowerCase().includes(query) ||
                    a.source.toLowerCase().includes(query) ||
                    (a.tags && a.tags.some(tag => tag.toLowerCase().includes(query)))
                );
            }
            
            // Sort by date (newest first)
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const container = document.getElementById('articles');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">No articles found. Try different search terms.</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(article => {
                const hasArchive = article.archive;
                const isPremium = article.premium;
                const sourceClass = isPremium ? 'premium' : 'free';
                
                html += 
                    '<div class="article">' +
                    '<div class="article-header">' +
                    '<span class="source ' + sourceClass + '">' + article.source + '</span>' +
                    '<span class="time">' + formatDate(article.date) + '</span>' +
                    '</div>' +
                    '<div class="title">' + article.title + '</div>' +
                    '<div class="desc">' + article.desc + '</div>' +
                    (article.tags ? '<div class="tags">' + 
                        article.tags.map(tag => '<span class="tag">' + tag + '</span>').join('') + 
                    '</div>' : '') +
                    '<div class="actions">' +
                    '<button class="btn btn-summary" onclick="showSummary(this)">Summary</button>' +
                    (hasArchive ? '<a href="' + article.archive + '" class="btn btn-archive" target="_blank">Archive</a>' : '') +
                    '<a href="' + article.link + '" class="btn btn-original" target="_blank">' + 
                    (isPremium ? 'Original (Premium)' : 'Read') + 
                    '</a>' +
                    '</div>' +
                    '</div>';
            });
            
            container.innerHTML = html;
            
            // Update active buttons
            document.querySelectorAll('.controls button').forEach(btn => {
                const text = btn.textContent.toLowerCase();
                btn.classList.toggle('active', 
                    (text.includes('all') && currentFilter === 'all') ||
                    (text.includes('research') && currentFilter === 'research') ||
                    (text.includes('news') && currentFilter === 'news')
                );
            });
        }
        
        function filter(type) {
            currentFilter = type;
            renderArticles();
        }
        
        function search(query) {
            currentSearch = query;
            renderArticles();
        }
        
        window.showSummary = function(button) {
            const article = button.closest('.article');
            const title = article.querySelector('.title').textContent;
            const desc = article.querySelector('.desc').textContent;
            const source = article.querySelector('.source').textContent;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = 
                '<div class="modal-content">' +
                '<div class="modal-title">' + title + '</div>' +
                '<div class="modal-text">' + 
                '<strong>Source:</strong> ' + source + '<br><br>' +
                desc + 
                '</div>' +
                '<button class="modal-close" onclick="this.closest('.modal').remove()">Close</button>' +
                '</div>';
            
            document.body.appendChild(modal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) modal.remove();
            });
        };

        init();
