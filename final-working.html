        /* Header */
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid #2d3748; margin-bottom: 30px; }
        h1 { color: #3b82f6; margin: 0 0 10px 0; font-size: 2.5rem; }
        .subtitle { color: #94a3b8; font-size: 1.1rem; margin-bottom: 20px; }
        
        /* Stats */
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat { background: #151520; padding: 15px 25px; border-radius: 8px; text-align: center; min-width: 120px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #3b82f6; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        
        /* Controls */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 10px 20px; background: #1e1e2e; border: 1px solid #2d3748; color: #94a3b8; border-radius: 6px; cursor: pointer; }
        .filter-btn.active { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #3b82f6; }
        .search-box { padding: 10px; background: #1e1e2e; border: 1px solid #2d3748; color: white; border-radius: 6px; width: 300px; max-width: 100%; }
        
        /* Articles Grid */
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        /* Article Card */
        .article-card { 
            background: #151520; 
            border: 1px solid #2d3748; 
            border-radius: 8px; 
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .article-card:hover { 
            transform: translateY(-2px); 
            border-color: #3b82f6; 
        }
        
        /* Article Header */
        .article-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .source-badge { 
            background: rgba(59, 130, 246, 0.1); 
            color: #3b82f6; 
            padding: 5px 10px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: 500;
        }
        .source-badge.premium::before { content: "🔒 "; }
        .time { color: #64748b; font-size: 12px; font-family: monospace; }
        
        /* Article Content */
        .article-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .article-desc { color: #94a3b8; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        
        /* Tags */
        .tags { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tag { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        
        /* Actions */
        .article-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn { 
            padding: 8px 15px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 500;
            display: inline-block;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.2s;
        }
        .btn-summary { 
            background: rgba(245, 158, 11, 0.1); 
            color: #f59e0b; 
            border-color: rgba(245, 158, 11, 0.2); 
        }
        .btn-summary:hover { 
            background: rgba(245, 158, 11, 0.2); 
            border-color: rgba(245, 158, 11, 0.4); 
        }
        .btn-archive { 
            background: rgba(139, 92, 246, 0.1); 
            color: #8b5cf6; 
            border-color: rgba(139, 92, 246, 0.2); 
        }
        .btn-archive:hover { 
            background: rgba(139, 92, 246, 0.2); 
            border-color: rgba(139, 92, 246, 0.4); 
        }
        .btn-original { 
            background: rgba(16, 185, 129, 0.1); 
            color: #10b981; 
            border-color: rgba(16, 185, 129, 0.2); 
        }
        .btn-original:hover { 
            background: rgba(16, 185, 129, 0.2); 
            border-color: rgba(16, 185, 129, 0.4); 
        }
        
        /* Modal */
        .modal { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.8); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            padding: 20px;
        }
        .modal-content { 
            background: #151520; 
            padding: 30px; 
            border-radius: 8px; 
            max-width: 600px; 
            width: 100%;
            border: 1px solid #2d3748;
        }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #e2e8f0; }
        .modal-text { color: #94a3b8; margin-bottom: 20px; line-height: 1.6; }
        .modal-close { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 4px; 
            cursor: pointer;
            font-weight: 500;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .articles-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: center; }
            .search-box { width: 100%; }

        // Format date
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return diffDays + ' days ago';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        // Render articles
        function renderArticles() {

            if (currentFilter !== 'all') {

                    a.desc.toLowerCase().includes(query) ||
                    a.source.toLowerCase().includes(query) ||
                    (a.tags && a.tags.some(tag => tag.toLowerCase().includes(query)))
                );
            }
            
            // Sort by date (newest first)
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const container = document.getElementById('articles-container');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #94a3b8; grid-column: 1 / -1;">No articles found. Try different search terms.</div>';

                const isPremium = article.premium;
                
                html += 
                    '<div class="article-card">' +
                    '<div class="article-header">' +
                    '<span class="source-badge ' + (isPremium ? 'premium' : '') + '">' + article.source + '</span>' +

                    '<div class="article-title">' + article.title + '</div>' +
                    '<div class="article-desc">' + article.desc + '</div>' +
                    (article.tags ? '<div class="tags">' +

                    '<button class="action-btn btn-summary" onclick="showSummary(this)">Summary</button>' +

                    (isPremium ? 'Original (Premium)' : 'Read') + 
                    '</a>' +
                    '</div>' +
                    '</div>';
            });
            
            container.innerHTML = html;
            
            // Update active buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const text = btn.textContent.toLowerCase();
                btn.classList.toggle('active', 
                    (text.includes('all') && currentFilter === 'all') ||
                    (text.includes('research') && currentFilter === 'research') ||
                    (text.includes('news') && currentFilter === 'news')
                );
            });
        }

            const date = card.querySelector('.time').textContent;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = 
                '<div class="modal-content">' +
                '<div class="modal-title">' + title + '</div>' +
                '<div class="modal-text">' +
                '<strong>Source:</strong> ' + source + '<br>' +
                '<strong>Date:</strong> ' + date + '<br><br>' +
                desc +
                '</div>' +
                '<button class="modal-close" onclick="this.closest('.modal').remove()">Close</button>' +
                '</div>';
            
            document.body.appendChild(modal);
            
            modal.addEventListener('click', function(e) {
                if (e.target === modal) modal.remove();
            });
        };
    </script>
</body>
</html>
